version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ExpenseApp@1
      MYSQL_DATABASE: expenses
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - expense-network

  backend:
    build: ./Backend
    container_name: backend
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
    ports:
      - "8080:8080"
    networks:
      - expense-network

  frontend:
    build: ./Frontend
    container_name: frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - expense-network

volumes:
  mysql-data:

networks:
  expense-network: